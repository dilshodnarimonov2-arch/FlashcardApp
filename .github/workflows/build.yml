name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Unzip project
        run: |
          unzip FlashcardApp.zip -d project

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Make gradlew executable
        run: chmod +x project/FlashcardApp/gradlew

      - name: Create google-services.json
        run: |
          cat > project/FlashcardApp/app/google-services.json << 'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "flashcard-app-demo",
              "storage_bucket": "flashcard-app-demo.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "com.flashcard.app"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "AIzaSyDEMO_KEY_PLACEHOLDER"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          JSON

      - name: Build Debug APK
        run: |
          cd project/FlashcardApp
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: FlashcardApp-debug
          path: project/FlashcardApp/app/build/outputs/apk/debug/app-debug.apk
